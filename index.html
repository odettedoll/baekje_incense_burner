<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백제 금동대향로</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{--gold:#c9a227;--gold-light:#e8c84a;--gold-pale:#f5e8b0;--bronze:#8b6914;--text:#e8d9b0;--dim:#9a8660;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0804;font-family:"Noto Sans KR",sans-serif;color:var(--text);}
#app{display:grid;grid-template-columns:1fr 430px;grid-template-rows:64px 1fr;height:100vh;}

/* 헤더 */
#hdr{grid-column:1/-1;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid rgba(201,162,39,.2);background:#080602;z-index:100;}
.tkr{font-family:"Noto Serif KR",serif;font-size:24px;font-weight:700;color:var(--gold-light);letter-spacing:.1em;}
.ten{font-size:13px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:2px;}

/* 뷰어 */
#viewer{position:relative;overflow:hidden;background:#050301;cursor:pointer;}

#incVid{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  height:100%;width:auto;max-width:100%;
  object-fit:contain;pointer-events:none;z-index:1;
  animation:glow 4s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{filter:drop-shadow(0 0 16px rgba(201,162,39,.18))}
  50%{filter:drop-shadow(0 0 34px rgba(201,162,39,.44))}
}
/* 구역 히트박스 */
#zov{position:absolute;inset:0;z-index:10;}
.zh{
  position:absolute;cursor:pointer;
  border:1px solid transparent;border-radius:3px;
  transition:border-color .2s,background .2s;
}
.zh:hover{border-color:rgba(201,162,39,.5);background:rgba(201,162,39,.07);}
.zh.active{border-color:rgba(201,162,39,.75);background:rgba(201,162,39,.1);}
.zhl{
  position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  font-family:"Noto Serif KR",serif;font-size:11px;color:var(--gold-light);
  white-space:nowrap;opacity:0;transition:opacity .2s;
  text-shadow:0 1px 6px #000,0 0 12px #000;pointer-events:none;
  background:rgba(0,0,0,.5);padding:2px 8px;border-radius:2px;
}
.zh:hover .zhl,.zh.active .zhl{opacity:1;}

/* 패널 */
#panel{background:linear-gradient(170deg,#131008 0%,#0a0804 100%);border-left:1px solid rgba(201,162,39,.15);display:flex;flex-direction:column;overflow:hidden;}
.ptop{padding:16px 18px 14px;border-bottom:1px solid rgba(201,162,39,.1);flex-shrink:0;}
.pname{font-family:"Noto Serif KR",serif;font-size:32px;font-weight:700;color:var(--gold-light);letter-spacing:.07em;}
.pen{font-size:16px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:3px;}
.pbody{padding:14px 18px;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bronze) transparent;}
.pbody::-webkit-scrollbar{width:3px;}.pbody::-webkit-scrollbar-thumb{background:var(--bronze);}

.srow{display:flex;gap:8px;margin-bottom:14px;}
.sbox{flex:1;border:1px solid rgba(201,162,39,.13);background:rgba(201,162,39,.05);padding:9px 6px;text-align:center;}
.snum{font-family:"Noto Serif KR",serif;font-size:34px;font-weight:700;color:var(--gold-light);line-height:1;}
.slbl{font-size:14px;color:var(--dim);margin-top:3px;letter-spacing:.06em;}

.desc{font-size:16px;line-height:1.9;color:#c8b98a;margin-bottom:14px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.fc{background:rgba(201,162,39,.05);border:1px solid rgba(201,162,39,.1);padding:11px 10px;font-size:15px;cursor:pointer;transition:all .2s;}
.fc:hover{background:rgba(201,162,39,.1);border-color:rgba(201,162,39,.35);}
.fc.lit{background:rgba(201,162,39,.16);border-color:var(--gold);}
.fi{font-size:22px;margin-bottom:4px;}.fn{color:var(--gold-pale);font-weight:500;margin-bottom:2px;}.fd{color:var(--dim);line-height:1.5;font-size:14px;}
.dlist{border-top:1px solid rgba(201,162,39,.07);}
.dr{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(201,162,39,.04);font-size:15px;}
.dk{color:var(--dim);min-width:52px;flex-shrink:0;}.dv{color:var(--text);line-height:1.6;}

/* 하단 탭 */
#znav{display:flex;flex-shrink:0;border-top:1px solid rgba(201,162,39,.12);background:#060402;}
.zt{flex:1;padding:9px 2px;border:none;background:transparent;color:var(--dim);font-size:14px;cursor:pointer;transition:all .2s;font-family:"Noto Sans KR",sans-serif;border-right:1px solid rgba(201,162,39,.07);position:relative;}
.zt:last-child{border-right:none;}
.zt:hover{color:var(--gold-light);background:rgba(201,162,39,.06);}
.zt.active{color:var(--gold-light);background:rgba(201,162,39,.1);}
.zt.active::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.zi{font-size:20px;display:block;margin-bottom:2px;}

@media(max-width:660px){#app{grid-template-columns:1fr;grid-template-rows:64px 1fr 36vh;}}

/* ── 줌 모달 ── */
#zoom-modal {
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.88);
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#zoom-modal.open { display:flex; }

#zoom-box {
  position:relative;
  width:min(80vw, 85vh);
  aspect-ratio: 4/3;
  overflow:hidden;
  border:1px solid rgba(201,162,39,.4);
  box-shadow:0 0 60px rgba(201,162,39,.2);
}

  phoenix:{name:"봉황 (鳳凰)",en:"PHOENIX FINIAL",humans:0,animals:1,
    desc:"향로 맨 꼭대기를 장식하는 봉황. 날개를 활짝 펼친 채 하늘을 향해 비상하는 모습으로, 신성한 세계의 문을 상징합니다. 봉황은 백제인들이 이상향으로 삼은 신선세계의 통치자이자 태평성대의 상징입니다.",
    details:[{k:"위치",v:"향로 전체 높이 61.8cm 중 최상단"},{k:"자세",v:"날개 활짝 펼쳐 비상, 화려한 꼬리 깃털"},{k:"상징",v:"신선세계 주재자, 태평성대"}],
    figs:[{i:"🐦",n:"봉황",d:"신성한 불사조\n신선세계의 문을 지킴"}]},

    desc:"23개의 산봉우리가 겹겹이 쌓인 가운데 신선, 악사, 짐승, 새 등 다양한 형상이 조각되어 있습니다. 5명의 악사와 6명의 신선이 섬세하게 표현되어 있습니다.",
    details:[{k:"산봉우리",v:"23개 — 중첩 산악 표현"},{k:"악사",v:"5명 — 현악·관악 연주자"},{k:"신선",v:"6명 — 산속 유유자적 선인"},{k:"동물",v:"호랑이·사슴·코끼리·원숭이 등 16종"}],
    figs:[{i:"🎵",n:"5인 악사",d:"피리·거문고·북·배소·완함"},{i:"🧙",n:"6인 신선",d:"불로불사의 선인들"},{i:"🐅",n:"호랑이",d:"산신의 상징"},{i:"🦌",n:"사슴",d:"장수·길상 2마리"},{i:"🐘",n:"코끼리",d:"불교적 상서로움"},{i:"🐒",n:"원숭이",d:"신선세계 영물"},{i:"🐦",n:"새 무리",d:"봉황·공작 포함"},{i:"🐟",n:"물고기",d:"생명과 풍요"}]},

    details:[{k:"형태",v:"연꽃 봉오리 — 상하 겹연꽃잎"},{k:"꽃잎",v:"상단 8판 + 하단 8판"},{k:"상징",v:"불교 청정·극락정토"}],
    figs:[{i:"🐉",n:"용 (龍)",d:"몸체를 감싸며 조각"},{i:"🦚",n:"봉황",d:"몸체 일면에 부조"},{i:"☁️",n:"구름 문양",d:"천상계의 상징"},{i:"🐟",n:"수중 동물",d:"물고기·거북이"},{i:"🦢",n:"수조 (水鳥)",d:"물가의 새들"},{i:"👤",n:"인물 2인",d:"악사·신선 형상"}]},

    desc:"줄기는 용이 기둥을 감아 오르는 형태로 하늘과 땅을 잇는 우주의 축을 상징합니다. 받침대는 용이 연꽃을 물고 4개의 발로 땅을 딛고 서서 향로 전체를 지탱합니다.",
    details:[{k:"줄기 형태",v:"원통형 기둥 + 용이 감아 오름"},{k:"줄기 상징",v:"천지를 연결하는 우주의 축"},{k:"받침대",v:"용이 연꽃(몸체)을 물고 있음"},{k:"발",v:"4개의 발, 각 3개의 발가락"}],
    figs:[{i:"🐉",n:"등용 (登龍)",d:"기둥을 타고 오르는 용"},{i:"✨",n:"구슬 마디",d:"여의주를 상징"},{i:"🐉",n:"주룡 (主龍)",d:"향로를 떠받치는 용"},{i:"🌊",n:"물결 문양",d:"용이 물에서 나옴"},{i:"🦎",n:"소형 동물들",d:"받침대 주변 짐승"}]}
};
const ORDER = ["phoenix","lid","bowl","stem"];
let curZone = null;

function sel(id) {
  curZone = id;
  document.querySelectorAll(".zh").forEach(e => e.classList.toggle("active", e.dataset.zone === id));
  document.querySelectorAll(".zt").forEach(b => b.classList.toggle("active", b.dataset.zone === id));
  const z = ZONES[id];
  document.getElementById("pname").textContent = z.name;
  document.getElementById("pen").textContent   = z.en;
  document.getElementById("pbody").innerHTML = `
    <div class="srow">
      <div class="sbox"><div class="snum">${z.humans}</div><div class="slbl">인물</div></div>
      <div class="sbox"><div class="snum">${z.animals}</div><div class="slbl">동물</div></div>
    </div>
    <p class="desc">${z.desc}</p>
    <div class="fgrid">${z.figs.map(f=>`
      <div class="fc" onclick="this.classList.toggle('lit')">
        <div class="fi">${f.i}</div>
        <div class="fn">${f.n}</div>
        <div class="fd">${f.d.replace(/\n/g,"<br>")}</div>
      </div>`).join("")}
    </div>
    <div class="dlist">${z.details.map(d=>`
      <div class="dr"><span class="dk">${d.k}</span><span class="dv">${d.v}</span></div>`).join("")}
    </div>`;
}

// 히트박스 클릭
document.querySelectorAll(".zh").forEach(el =>
  el.addEventListener("click", () => sel(el.dataset.zone)));

// 하단 탭 클릭
document.querySelectorAll(".zt").forEach(el =>
  el.addEventListener("click", () => sel(el.dataset.zone)));

// 키보드
document.addEventListener("keydown", e => {
  const i = ORDER.indexOf(curZone);
  if (e.key === "ArrowRight") sel(ORDER[(i+1)%5]);
  if (e.key === "ArrowLeft")  sel(ORDER[(i+4)%5]);
});

sel("phoenix");

const ZOOM_PARAMS = {
  phoenix: { cx:50, cy:45, scale:1.0, img: PHOENIX_IMG },
  lid:     { cx:50, cy:50, scale:1.0, img: LID_IMG },
  bowl:    { cx:50, cy:50, scale:1.0, img: BOWL_IMG },
  stem:    { cx:50, cy:50, scale:1.0, img: STEM_IMG },

};

function openZoom(id) {
  const z  = ZONES[id];
  const zp = ZOOM_PARAMS[id];
  const modal = document.getElementById("zoom-modal");
  const box   = document.getElementById("zoom-box");
  const div   = document.getElementById("zoom-img");
  const lbl   = document.getElementById("zoom-label");

  // 박스 실제 크기 (px)
  const bW = box.offsetWidth;
  const bH = box.offsetHeight;

  // 봉황 전용 이미지가 있으면 그걸 사용
  if (zp.img) {
    div.style.backgroundImage = "url('" + zp.img + "')";
    div.style.backgroundSize = "cover";
    div.style.backgroundPosition = "center center";
    lbl.textContent = z.name;
    modal.classList.add("open");
    return;
  }

  // 이미지 원본 비율: 1605/2000 = 0.8025
  const IMG_RATIO = 1605 / 2000;

  // background-size: s배 확대 → 표시 너비 = bW * s, 표시 높이 = bW * s / IMG_RATIO
  const s   = zp.scale;
  const dW  = bW * s;
  const dH  = dW / IMG_RATIO;

  // 구역 중심 px (표시 이미지 기준)
  const cxPx = dW * (zp.cx / 100);
  const cyPx = dH * (zp.cy / 100);

  // 박스 중앙에 오려면 이미지를 얼마나 이동?
  // background-position-x(px) = -(cxPx - bW/2)
  const bgX = -(cxPx - bW / 2);
  const bgY = -(cyPx - bH / 2);

  div.style.backgroundSize     = dW + "px " + dH + "px";
  div.style.backgroundPosition = bgX + "px " + bgY + "px";

  lbl.textContent = z.name;
  modal.classList.add("open");
}

function closeZoom() {
  document.getElementById("zoom-modal").classList.remove("open");
}

document.getElementById("zoom-modal").addEventListener("click", e => {
  if(e.target === document.getElementById("zoom-modal")) closeZoom();
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeZoom();
});

window.addEventListener("load", () => sel("phoenix"));
</script>
